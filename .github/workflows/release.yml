name: release

on:
  push:
    tags: ["v*"]
  # Manual dispatch on a branch ref runs only build-windows (the other jobs are
  # tag-gated) so the Windows packaging can be validated before a real release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Both macOS arches build on the arm64 runner via cross-compilation (macOS clang is a
    # universal toolchain). Avoids depending on the scarce/slow macos-13 Intel runners.
    if: github.ref_type == 'tag'
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: rustup show                              # installs the rust-toolchain.toml version
      - run: rustup target add ${{ matrix.target }}  # add the cross std for this toolchain
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="repomon-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "target/${{ matrix.target }}/release/repomon" \
             "target/${{ matrix.target }}/release/repomond" "$DIST/"
          tar -czf "${DIST}.tar.gz" -C "$DIST" repomon repomond
          shasum -a 256 "${DIST}.tar.gz" | awk '{print $1}' > "${DIST}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            repomon-*.tar.gz
            repomon-*.tar.gz.sha256

  build-linux:
    # Each Linux arch builds natively on its own runner (no cross C toolchain needed).
    if: github.ref_type == 'tag'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="repomon-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "target/${{ matrix.target }}/release/repomon" \
             "target/${{ matrix.target }}/release/repomond" "$DIST/"
          tar -czf "${DIST}.tar.gz" -C "$DIST" repomon repomond
          sha256sum "${DIST}.tar.gz" | awk '{print $1}' > "${DIST}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            repomon-*.tar.gz
            repomon-*.tar.gz.sha256

  build-windows:
    # Runs on tag pushes AND on workflow_dispatch from any branch, so the Windows
    # packaging can be exercised before the release flow is finalized.
    #
    # The native Windows port has landed and the workspace builds and tests green on
    # x86_64-pc-windows-msvc, so that leg is required. aarch64-pc-windows-msvc stays
    # best-effort (stretch target, allowed to fail).
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            experimental: false
          - target: aarch64-pc-windows-msvc
            experimental: true # stretch target, allowed to fail
    continue-on-error: ${{ matrix.experimental }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -like 'refs/tags/*') {
            $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            "0.0.0-$($env:GITHUB_SHA.Substring(0, 7))" # branch dispatch: dev version
          }
          $dist = "repomon-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/repomon.exe", `
            "target/${{ matrix.target }}/release/repomond.exe" -Destination $dist
          # repomon-agent-host (crates/repomon-host, Track C) may not have landed
          # yet; include it in the zip whenever the workspace produced it.
          $agentHost = "target/${{ matrix.target }}/release/repomon-agent-host.exe"
          if (Test-Path $agentHost) { Copy-Item $agentHost -Destination $dist }
          Compress-Archive -Path "$dist/*" -DestinationPath "$dist.zip"
          (Get-FileHash "$dist.zip" -Algorithm SHA256).Hash.ToLower() |
            Set-Content "$dist.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            repomon-*.zip
            repomon-*.zip.sha256

  universal:
    # Merge the two thin binaries into one fat (arm64+x86_64) archive for a
    # one-download-fits-all manual install. lipo is macOS-only, so this runs on macOS.
    if: github.ref_type == 'tag'
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: lipo universal binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p arm intel uni
          tar -xzf "dist/repomon-${VERSION}-aarch64-apple-darwin.tar.gz" -C arm
          tar -xzf "dist/repomon-${VERSION}-x86_64-apple-darwin.tar.gz" -C intel
          lipo -create -output uni/repomon  arm/repomon  intel/repomon
          lipo -create -output uni/repomond arm/repomond intel/repomond
          DIST="repomon-${VERSION}-universal-apple-darwin"
          tar -czf "${DIST}.tar.gz" -C uni repomon repomond
          shasum -a 256 "${DIST}.tar.gz" | awk '{print $1}' > "${DIST}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: |
            repomon-*-universal-apple-darwin.tar.gz
            repomon-*-universal-apple-darwin.tar.gz.sha256

  release:
    if: github.ref_type == 'tag'
    needs: [build, universal, build-linux, build-windows]
    runs-on: ubuntu-latest
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4        # for install.sh / install.ps1
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # nullglob: the Windows zips are best-effort while build-windows is
          # continue-on-error; a release without them must still succeed.
          shopt -s nullglob
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.zip dist/*.zip.sha256 \
            install.sh install.ps1 \
            --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes
      - name: Bump tap formula
        if: env.HAS_TAP_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_SHA="$(cat dist/repomon-${VERSION}-aarch64-apple-darwin.tar.gz.sha256)"
          X86_SHA="$(cat dist/repomon-${VERSION}-x86_64-apple-darwin.tar.gz.sha256)"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/AliHamzaAzam/homebrew-tap.git" tap
          cd tap
          sed -i -E "s|^( *version )\".*\"|\1\"${VERSION}\"|" Formula/repomon.rb
          sed -i -E "s|^( *sha256 )\"[0-9a-f]*\"( # aarch64)|\1\"${ARM_SHA}\"\2|" Formula/repomon.rb
          sed -i -E "s|^( *sha256 )\"[0-9a-f]*\"( # x86_64)|\1\"${X86_SHA}\"\2|" Formula/repomon.rb
          git config user.name "repomon-release-bot"
          git config user.email "repomon-release-bot@users.noreply.github.com"
          git commit -am "repomon ${VERSION}"
          git push
