name: desktop preview

# Unsigned, installable preview bundles for testers. Decoupled from the production `v*` release
# (which also runs the CLI + Homebrew pipeline and requires signing secrets): this lane fires on
# its own `desktop-v*` tag, needs no secrets, and publishes a prerelease with dmg + Linux bundles.
on:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

jobs:
  preview:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-14
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
          # Windows needs repomon-core's named-pipe transport (branch release/windows-preview).
          # Kept here as an allowed failure so it lights up automatically once that merges.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            windows_preview: true
    continue-on-error: ${{ matrix.windows_preview || false }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup target add ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          librsvg2-dev
          libayatana-appindicator3-dev
          patchelf
          rpm
          tmux
      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile
      - name: Build daemon sidecar
        shell: bash
        run: |
          cargo build --release --locked -p repomon-daemon --target "${{ matrix.target }}"
          mkdir -p apps/desktop/src-tauri/binaries
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/repomond.exe" "apps/desktop/src-tauri/binaries/repomond-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/repomond" "apps/desktop/src-tauri/binaries/repomond-${{ matrix.target }}"
          fi
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: Repomon Desktop ${{ github.ref_name }} (unsigned preview)
          releaseBody: |
            Unsigned preview build of the Repomon desktop app, for testing only.

            Requires a working `repomon`/`repomond` setup and `tmux` on the machine.

            - macOS: unsigned. After copying to Applications, right-click the app and choose Open
              to get past Gatekeeper (or run `xattr -dr com.apple.quarantine /Applications/Repomon.app`).
            - Linux: AppImage, deb, or rpm. Requires `tmux`.
            - Windows: pending the native named-pipe transport (branch release/windows-preview).
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config src-tauri/tauri.preview.conf.json
