name: desktop preview

# Signed, installable preview bundles for testers, plus the in-app updater feed. Decoupled from
# the production `v*` release (which also runs the CLI + Homebrew pipeline): this lane fires on
# its own `desktop-v*` tag and publishes to a fixed moving `desktop-preview` release so the
# updater has a stable endpoint (releases/download/desktop-preview/latest.json).
on:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

concurrency:
  group: desktop-preview
  cancel-in-progress: false

jobs:
  # Reset the moving release so the matrix rebuilds every asset + latest.json from scratch. Without
  # this the version-less .app.tar.gz is not reliably replaced and latest.json's per-platform
  # signatures go stale — which cryptographically breaks the macOS updater (a fresh artifact served
  # against a stale signature). Runs before the (now serialized) matrix.
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Delete the stale desktop-preview release + tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete desktop-preview -R ${{ github.repository }} --cleanup-tag --yes || true

  preview:
    needs: reset
    strategy:
      fail-fast: false
      # Serialize the platforms: each job read-modify-writes the SAME latest.json on the moving
      # release, so running them in parallel clobbers each other's signatures. One at a time, each
      # merges its platform onto the previous job's fresh result.
      max-parallel: 1
      matrix:
        include:
          # One universal macOS build: a single dmg + one .app.tar.gz updater artifact that
          # serves both Apple Silicon and Intel (avoids the per-arch updater-name collision).
          - platform: macos-14
            target: universal-apple-darwin
            bundles: app,dmg
            config: src-tauri/tauri.preview.conf.json
            apple_universal: true
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            config: src-tauri/tauri.preview.conf.json
          # Windows bundles both sidecars: the daemon plus the per-agent ConPTY host it spawns.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            config: src-tauri/tauri.preview.win.conf.json
            host_sidecar: true
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - name: Add Rust targets
        shell: bash
        run: |
          if [[ "${{ matrix.apple_universal }}" == "true" ]]; then
            rustup target add aarch64-apple-darwin x86_64-apple-darwin
          else
            rustup target add "${{ matrix.target }}"
          fi
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          librsvg2-dev
          libayatana-appindicator3-dev
          patchelf
          rpm
          tmux
      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile
      - name: Build daemon sidecar
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          if [[ "${{ matrix.apple_universal }}" == "true" ]]; then
            # The universal build compiles each arch slice (needs the per-arch sidecar) and then
            # copies the universal-named one when bundling, so provide all three.
            cargo build --release --locked -p repomon-daemon --target aarch64-apple-darwin
            cargo build --release --locked -p repomon-daemon --target x86_64-apple-darwin
            cp target/aarch64-apple-darwin/release/repomond apps/desktop/src-tauri/binaries/repomond-aarch64-apple-darwin
            cp target/x86_64-apple-darwin/release/repomond apps/desktop/src-tauri/binaries/repomond-x86_64-apple-darwin
            lipo -create -output apps/desktop/src-tauri/binaries/repomond-universal-apple-darwin \
              target/aarch64-apple-darwin/release/repomond \
              target/x86_64-apple-darwin/release/repomond
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            cargo build --release --locked -p repomon-daemon --target "${{ matrix.target }}"
            cp "target/${{ matrix.target }}/release/repomond.exe" "apps/desktop/src-tauri/binaries/repomond-${{ matrix.target }}.exe"
          else
            cargo build --release --locked -p repomon-daemon --target "${{ matrix.target }}"
            cp "target/${{ matrix.target }}/release/repomond" "apps/desktop/src-tauri/binaries/repomond-${{ matrix.target }}"
          fi
      - name: Build agent-host sidecar (Windows)
        if: ${{ matrix.host_sidecar }}
        shell: bash
        run: |
          cargo build --release --locked -p repomon-host --target "${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/repomon-agent-host.exe" "apps/desktop/src-tauri/binaries/repomon-agent-host-${{ matrix.target }}.exe"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          # Fixed moving release so the in-app updater has a stable endpoint
          # (releases/download/desktop-preview/latest.json). Each desktop-v* tag refreshes it.
          tagName: desktop-preview
          releaseName: Repomon Desktop (preview)
          releaseBody: |
            Rolling preview build of the Repomon desktop app, for testing. The installed app
            auto-updates from this release (updates are cryptographically signed; the OS-level
            code signature is not set yet, so first install shows a Gatekeeper/SmartScreen prompt).

            Requires a working `repomon`/`repomond` setup (tmux on macOS/Linux).

            - macOS: universal dmg. Right-click the app and choose Open on first launch
              (or `xattr -dr com.apple.quarantine /Applications/Repomon.app`).
            - Linux: AppImage (auto-updates), deb, or rpm. Requires `tmux`.
            - Windows: NSIS installer. Bundles the daemon and per-agent ConPTY host (no tmux needed).
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config ${{ matrix.config }}

  cleanup:
    needs: preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove stale preview assets and verify updater manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)"
          gh release view desktop-preview --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            case "$asset" in
              latest.json|Repomon_universal.app.tar.gz|Repomon_universal.app.tar.gz.sig|*"$version"*) ;;
              *) gh release delete-asset desktop-preview "$asset" -y ;;
            esac
          done
          asset_id="$(gh api repos/${{ github.repository }}/releases/tags/desktop-preview --jq '.assets[] | select(.name == "latest.json") | .id')"
          gh api "repos/${{ github.repository }}/releases/assets/$asset_id" -H "Accept: application/octet-stream" > latest.json
          jq -e --arg version "$version" '
            .version == $version
            and (.platforms["darwin-aarch64"].signature | length > 0)
            and (.platforms["linux-x86_64"].signature | length > 0)
            and (.platforms["windows-x86_64"].signature | length > 0)
          ' latest.json
