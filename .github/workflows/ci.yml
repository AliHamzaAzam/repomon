name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show # installs the rust-toolchain.toml version
      - name: Install desktop and tmux dependencies (Linux)
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          librsvg2-dev
          libayatana-appindicator3-dev
          tmux
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - name: Check generated desktop bindings
        run: >-
          TS_RS_EXPORT_DIR=../../apps/desktop/src/bindings
          cargo test -p repomon-core --features ts export_bindings --locked
      - run: git diff --exit-code -- apps/desktop/src/bindings

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
      - run: bun run build

  desktop-e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install desktop test dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          librsvg2-dev
          libayatana-appindicator3-dev
          webkit2gtk-driver
          xvfb
          tmux
      - run: cargo install tauri-driver --locked
      - run: cargo build -p repomon-tui -p repomon-daemon --locked
      - run: bun install --frozen-lockfile
        working-directory: apps/desktop
      - run: bun tauri build --debug --no-bundle
        working-directory: apps/desktop
      - run: xvfb-run -a bun run e2e
        working-directory: apps/desktop
        env:
          REPOMON_E2E_SCREENSHOT: ${{ github.workspace }}/apps/desktop/e2e/desktop-e2e.png
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-e2e-screenshot
          path: apps/desktop/e2e/desktop-e2e.png
          if-no-files-found: ignore
